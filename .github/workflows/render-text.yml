name: Render Text

on:
  workflow_dispatch:
    inputs:
      font:
        description: "Path to font file (relative to repo root)"
        required: false
        default: "data/test/Inconsolata[wdth,wght].ttf"
      text:
        description: "String to render"
        required: false
        default: "The quick brown fox jumps over the lazy dog"
  push:
    paths:
      - "Lib/gftools/scripts/render_text.py"
      - "Lib/gftools/render_text/**"
      - ".github/workflows/render-text.yml"

permissions:
  contents: read

jobs:
  render:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Cairo (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev

      - name: Install gftools
        run: pip install -e '.[qa]'

      - name: Render waterfall
        shell: bash
        env:
          FONT: ${{ github.event.inputs.font || 'data/test/Inconsolata[wdth,wght].ttf' }}
          TEXT: ${{ github.event.inputs.text || 'The quick brown fox jumps over the lazy dog' }}
        run: |
          gftools render-text proof \
            -o "render-${{ matrix.os }}.png" \
            "$FONT" \
            "$TEXT"

      - name: Upload rendered PNG
        uses: actions/upload-artifact@v7
        with:
          name: render-text-output-${{ matrix.os }}
          path: render-${{ matrix.os }}.png
          if-no-files-found: error
